<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel | Leonardo David</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    /* ── Login ─────────────────────────────── */
    .pa-login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .pa-login-box {
      width: 100%;
      max-width: 360px;
      background: var(--black-3);
      border: 1px solid rgba(201, 168, 76, .15);
      border-radius: 4px;
      padding: 48px 40px;
      text-align: center;
    }

    .pa-login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      color: var(--white);
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .pa-login-logo span {
      color: var(--gold);
    }

    .pa-login-sub {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 40px;
    }

    .pa-login-label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 10px;
      text-align: left;
    }

    .pa-login-input {
      width: 100%;
      background: var(--black-4);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 3px;
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      padding: 13px 16px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 8px;
    }

    .pa-login-input:focus {
      border-color: rgba(201, 168, 76, .5);
    }

    .pa-login-input.pa-input-erro {
      border-color: #c0392b;
      animation: pa-shake .35s ease;
    }

    @keyframes pa-shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .pa-login-erro {
      font-size: 11px;
      color: #c0392b;
      margin-bottom: 20px;
      min-height: 16px;
      text-align: left;
    }

    .pa-google-btn {
      width: 100%;
      background: #fff;
      color: #3c4043;
      border: 1px solid #dadce0;
      border-radius: 3px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 400;
      padding: 13px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .15s, box-shadow .15s;
    }

    .pa-google-btn:hover {
      background: #f8f9fa;
      box-shadow: 0 1px 6px rgba(0,0,0,.15);
    }

    .pa-google-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    /* ── Dashboard ─────────────────────────── */
    .pa-dashboard {
      display: none;
      min-height: 100vh;
      padding: 32px 24px 80px;
      max-width: 780px;
      margin: 0 auto;
    }

    .pa-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
      flex-wrap: wrap;
      gap: 12px;
    }

    .pa-top-left {}

    .pa-top-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--white);
    }

    .pa-top-title em {
      font-style: italic;
      color: var(--gold);
    }

    .pa-top-date {
      font-size: 11px;
      color: var(--gray);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .pa-sair-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      background: transparent;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 3px;
      padding: 9px 16px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }

    .pa-sair-btn:hover {
      color: var(--white);
      border-color: rgba(255, 255, 255, .25);
    }

    /* Stats */
    .pa-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 40px;
    }

    @media (max-width: 520px) {
      .pa-stats { grid-template-columns: 1fr 1fr; }
    }

    .pa-stat {
      background: var(--black-3);
      border: 1px solid rgba(201, 168, 76, .08);
      border-radius: 4px;
      padding: 20px;
    }

    .pa-stat-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 6px;
    }

    .pa-stat-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* Loading */
    .pa-loading {
      text-align: center;
      padding: 64px 0;
      color: var(--gray);
      font-size: 13px;
    }

    .pa-spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(201, 168, 76, .2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: pa-spin .7s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes pa-spin { to { transform: rotate(360deg); } }

    /* Empty */
    .pa-empty {
      text-align: center;
      padding: 64px 0;
      color: var(--gray);
      font-size: 13px;
    }

    /* Hoje */
    .pa-hoje-section {
      margin-bottom: 40px;
    }

    .pa-hoje-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .pa-hoje-titulo {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #27ae60;
    }

    .pa-hoje-count {
      font-size: 10px;
      background: rgba(39,174,96,.15);
      color: #27ae60;
      border: 1px solid rgba(39,174,96,.25);
      border-radius: 20px;
      padding: 2px 10px;
      letter-spacing: 1px;
    }

    .pa-hoje-vazio {
      font-size: 13px;
      color: var(--gray);
      padding: 20px 0;
      text-align: center;
    }

    /* Próximos dias */
    .pa-proximos-section {
      margin-bottom: 40px;
    }

    .pa-proximos-titulo {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }

    .pa-dia-group {
      margin-bottom: 24px;
    }

    .pa-dia-label {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pa-dia-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(201,168,76,.15);
    }

    /* Groups */
    .pa-group {
      margin-bottom: 44px;
    }

    .pa-group-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
    }

    /* Cards */
    .pa-card {
      background: var(--black-3);
      border: 1px solid rgba(201, 168, 76, .08);
      border-radius: 4px;
      padding: 20px 24px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      transition: border-color .2s;
    }

    .pa-card-proximo {
      border-left: 2px solid var(--gold);
    }

    .pa-card-proximo:hover {
      border-color: rgba(201, 168, 76, .35);
      border-left-color: var(--gold);
    }

    .pa-card-passado {
      opacity: .55;
    }

    .pa-card-passado:hover {
      opacity: .75;
    }

    .pa-card-today {
      border-left: 2px solid #27ae60;
      background: rgba(39, 174, 96, .04);
    }

    .pa-card-today:hover {
      border-left-color: #27ae60;
      border-color: rgba(39, 174, 96, .3);
    }

    .pa-card-main {
      flex: 1;
      min-width: 0;
    }

    .pa-card-nome {
      font-size: 14px;
      color: var(--white);
      font-weight: 400;
      margin-bottom: 6px;
    }

    .pa-card-servico {
      font-size: 12px;
      color: var(--gold-light);
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pa-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 18px;
    }

    .pa-card-meta-item {
      font-size: 12px;
      color: var(--gray-light);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .pa-card-meta-item svg {
      opacity: .5;
      flex-shrink: 0;
    }

    .pa-card-wa {
      color: var(--gray-light);
      text-decoration: none;
      transition: color .2s;
    }

    .pa-card-wa:hover {
      color: #25d366;
    }

    .pa-card-obs {
      margin-top: 8px;
      font-size: 11px;
      color: #666;
      font-style: italic;
    }

    .pa-card-right {
      text-align: right;
      flex-shrink: 0;
    }

    .pa-card-total {
      font-size: 17px;
      color: var(--gold);
      margin-bottom: 8px;
      font-weight: 300;
    }

    .pa-badge {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }

    .pa-badge-hoje {
      background: rgba(39, 174, 96, .15);
      color: #2ecc71;
      border: 1px solid rgba(39, 174, 96, .3);
    }

    .pa-badge-proximo {
      background: rgba(201, 168, 76, .12);
      color: var(--gold);
      border: 1px solid rgba(201, 168, 76, .25);
    }

    .pa-badge-passado {
      background: rgba(136, 136, 136, .08);
      color: var(--gray);
      border: 1px solid rgba(136, 136, 136, .15);
    }

    .pa-no-items {
      color: var(--gray);
      font-size: 13px;
      padding: 12px 0;
      text-align: center;
    }

    @media (max-width: 540px) {
      .pa-card {
        flex-direction: column;
        gap: 12px;
      }

      .pa-card-right {
        text-align: left;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .pa-card-total { margin-bottom: 0; }
    }
  </style>
</head>

<body>

  <!-- ═══ LOGIN ═══════════════════════════════════════════════ -->
  <div class="pa-login-wrap" id="pa-login">
    <div class="pa-login-box">
      <div class="pa-login-logo">Leonardo David <span>|</span> Visagista</div>
      <div class="pa-login-sub">&#193;rea restrita</div>

      <div class="pa-login-erro" id="pa-login-erro"></div>
      <button class="pa-google-btn" id="pa-entrar">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Entrar com Google
      </button>
    </div>
  </div>

  <!-- ═══ DASHBOARD ════════════════════════════════════════════ -->
  <div class="pa-dashboard" id="pa-dashboard">

    <div class="pa-top">
      <div class="pa-top-left">
        <div class="pa-top-title">Painel de <em>Agendamentos</em></div>
        <div class="pa-top-date" id="pa-hoje-label"></div>
      </div>
      <button class="pa-sair-btn" id="pa-sair">Sair</button>
    </div>

    <div class="pa-stats">
      <div class="pa-stat">
        <div class="pa-stat-val" id="pa-stat-hoje">—</div>
        <div class="pa-stat-label">Hoje</div>
      </div>
      <div class="pa-stat">
        <div class="pa-stat-val" id="pa-stat-proximos">—</div>
        <div class="pa-stat-label">Pr&#243;ximos</div>
      </div>
      <div class="pa-stat">
        <div class="pa-stat-val" id="pa-stat-total">—</div>
        <div class="pa-stat-label">Total</div>
      </div>
    </div>

    <div id="pa-conteudo">
      <div class="pa-loading">
        <div class="pa-spinner"></div>
        Carregando agendamentos&#8230;
      </div>
    </div>

  </div>

  <script>
    (function () {
      var firebaseConfig = {
        apiKey: "AIzaSyBgUdYzrPykpQA86f_B1mAGSr7zoxZwFDM",
        authDomain: "site-barbearia-9add5.firebaseapp.com",
        databaseURL: "https://site-barbearia-9add5-default-rtdb.firebaseio.com",
        projectId: "site-barbearia-9add5",
        storageBucket: "site-barbearia-9add5.firebasestorage.app",
        messagingSenderId: "677128081916",
        appId: "1:677128081916:web:4ca7538328bb20885c2279"
      };
      firebase.initializeApp(firebaseConfig);
      var auth = firebase.auth();
      var db = firebase.database();

      /* ── Auth ── */
      var EMAIL_AUTORIZADO = 'eduhloboh@gmail.com';

      var loginWrap = document.getElementById('pa-login');
      var dashboard = document.getElementById('pa-dashboard');
      var erroEl = document.getElementById('pa-login-erro');
      var entrarBtn = document.getElementById('pa-entrar');

      auth.onAuthStateChanged(function (user) {
        if (user && user.email === EMAIL_AUTORIZADO) {
          abrirDashboard();
        } else {
          if (user) auth.signOut(); // logou com conta errada
          loginWrap.style.display = 'flex';
          dashboard.style.display = 'none';
        }
      });

      entrarBtn.addEventListener('click', function () {
        erroEl.textContent = '';
        entrarBtn.disabled = true;
        auth.signOut().then(function () {
          var provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: 'select_account' });
          auth.signInWithPopup(provider)
            .catch(function () {
              erroEl.textContent = 'N\xe3o foi poss\xedvel entrar. Tente novamente.';
              entrarBtn.disabled = false;
            });
        });
      });

      document.getElementById('pa-sair').addEventListener('click', function () {
        auth.signOut();
      });

      function abrirDashboard() {
        loginWrap.style.display = 'none';
        dashboard.style.display = 'block';
        renderHojeLabel();
        carregarAgendamentos();
      }

      /* ── Helpers de data ── */
      function hoje() {
        var d = new Date();
        d.setHours(0, 0, 0, 0);
        return d;
      }

      function parseDataBR(str) {
        if (!str) return null;
        var p = str.split('/');
        if (p.length !== 3) return null;
        return new Date(+p[2], +p[1] - 1, +p[0]);
      }

      function formatDataExibicao(str) {
        var d = parseDataBR(str);
        if (!d) return str;
        var dias = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'S\xe1b'];
        var meses = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
        return dias[d.getDay()] + ', ' + d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
      }

      function renderHojeLabel() {
        var d = new Date();
        var dias = ['Domingo', 'Segunda', 'Ter\xe7a', 'Quarta', 'Quinta', 'Sexta', 'S\xe1bado'];
        var meses = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
        document.getElementById('pa-hoje-label').textContent =
          dias[d.getDay()] + ', ' + d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
      }

      function isHoje(dataStr) {
        var d = parseDataBR(dataStr);
        if (!d) return false;
        return d.getTime() === hoje().getTime();
      }

      function isProximo(dataStr) {
        var d = parseDataBR(dataStr);
        if (!d) return false;
        return d >= hoje();
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#x27;');
      }

      /* ── Renderizar card ── */
      function renderCard(ag) {
        var ehHoje = isHoje(ag.data);
        var ehProximo = isProximo(ag.data);

        var cls = 'pa-card ';
        if (ehHoje) cls += 'pa-card-today';
        else if (ehProximo) cls += 'pa-card-proximo';
        else cls += 'pa-card-passado';

        var badge = ehHoje
          ? '<span class="pa-badge pa-badge-hoje">Hoje</span>'
          : ehProximo
            ? '<span class="pa-badge pa-badge-proximo">Pendente</span>'
            : '<span class="pa-badge pa-badge-passado">Realizado</span>';

        var waDigits = (ag.whatsapp || '').replace(/\D/g, '');
        var waLink = waDigits
          ? '<a class="pa-card-wa" href="https://wa.me/55' + waDigits + '" target="_blank" rel="noopener noreferrer">' + escHtml(ag.whatsapp) + '</a>'
          : '\u2014';

        var obsHtml = ag.obs
          ? '<div class="pa-card-obs">' + escHtml(ag.obs) + '</div>'
          : '';

        var div = document.createElement('div');
        div.className = cls;
        div.innerHTML =
          '<div class="pa-card-main">' +
            '<div class="pa-card-nome">' + escHtml(ag.nome || '\u2014') + '</div>' +
            '<div class="pa-card-servico">' + escHtml(ag.servicos || ag.servico || '\u2014') + '</div>' +
            '<div class="pa-card-meta">' +
              '<span class="pa-card-meta-item">' +
                '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' +
                escHtml(formatDataExibicao(ag.data)) +
              '</span>' +
              '<span class="pa-card-meta-item">' +
                '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
                escHtml(ag.hora || '\u2014') +
              '</span>' +
              '<span class="pa-card-meta-item">' +
                '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.69A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>' +
                waLink +
              '</span>' +
            '</div>' +
            obsHtml +
          '</div>' +
          '<div class="pa-card-right">' +
            '<div class="pa-card-total">R$ ' + (ag.total || 0) + '</div>' +
            badge +
          '</div>';

        return div;
      }

      /* ── Carregar dados ── */
      function carregarAgendamentos() {
        var conteudo = document.getElementById('pa-conteudo');

        db.ref('agendamentos-completos').once('value', function (snap) {
          var data = snap.val();
          conteudo.innerHTML = '';

          if (!data) {
            conteudo.innerHTML = '<div class="pa-empty">Nenhum agendamento cadastrado ainda.</div>';
            document.getElementById('pa-stat-hoje').textContent = '0';
            document.getElementById('pa-stat-proximos').textContent = '0';
            document.getElementById('pa-stat-total').textContent = '0';
            return;
          }

          var lista = [];
          Object.keys(data).forEach(function (k) { lista.push(data[k]); });

          lista.sort(function (a, b) {
            var da = parseDataBR(a.data);
            var db2 = parseDataBR(b.data);
            if (!da || !db2) return 0;
            if (da.getTime() !== db2.getTime()) return da - db2;
            return (a.hora || '').localeCompare(b.hora || '');
          });

          var agHoje = lista.filter(function (ag) { return isHoje(ag.data); });
          var agFuturos = lista.filter(function (ag) { return isProximo(ag.data) && !isHoje(ag.data); });
          var agPassados = lista.filter(function (ag) { return !isProximo(ag.data); }).reverse();

          document.getElementById('pa-stat-hoje').textContent = agHoje.length;
          document.getElementById('pa-stat-proximos').textContent = agFuturos.length;
          document.getElementById('pa-stat-total').textContent = lista.length;

          /* ── Hoje ── */
          var secHoje = document.createElement('div');
          secHoje.className = 'pa-hoje-section';
          var headerHoje = document.createElement('div');
          headerHoje.className = 'pa-hoje-header';
          headerHoje.innerHTML =
            '<span class="pa-hoje-titulo">Hoje</span>' +
            '<span class="pa-hoje-count">' + agHoje.length + ' cliente' + (agHoje.length !== 1 ? 's' : '') + '</span>';
          secHoje.appendChild(headerHoje);

          if (agHoje.length === 0) {
            var semHoje = document.createElement('p');
            semHoje.className = 'pa-hoje-vazio';
            semHoje.textContent = 'Nenhum agendamento para hoje.';
            secHoje.appendChild(semHoje);
          } else {
            agHoje.forEach(function (ag) { secHoje.appendChild(renderCard(ag)); });
          }
          conteudo.appendChild(secHoje);

          /* ── Próximos dias ── */
          if (agFuturos.length > 0) {
            var secProx = document.createElement('div');
            secProx.className = 'pa-proximos-section';
            var tituloProx = document.createElement('div');
            tituloProx.className = 'pa-proximos-titulo';
            tituloProx.textContent = 'Pr\xf3ximos dias';
            secProx.appendChild(tituloProx);

            var porDia = {};
            agFuturos.forEach(function (ag) {
              if (!porDia[ag.data]) porDia[ag.data] = [];
              porDia[ag.data].push(ag);
            });

            Object.keys(porDia).sort(function (a, b) {
              return parseDataBR(a) - parseDataBR(b);
            }).forEach(function (data) {
              var grpDia = document.createElement('div');
              grpDia.className = 'pa-dia-group';
              var lblDia = document.createElement('div');
              lblDia.className = 'pa-dia-label';
              lblDia.textContent = formatDataExibicao(data) + ' \u00b7 ' + porDia[data].length + ' cliente' + (porDia[data].length !== 1 ? 's' : '');
              grpDia.appendChild(lblDia);
              porDia[data].forEach(function (ag) { grpDia.appendChild(renderCard(ag)); });
              secProx.appendChild(grpDia);
            });
            conteudo.appendChild(secProx);
          }

          /* ── Histórico ── */
          if (agPassados.length > 0) {
            var grpHist = document.createElement('div');
            grpHist.className = 'pa-group';
            var lblHist = document.createElement('div');
            lblHist.className = 'pa-group-label';
            lblHist.textContent = 'Hist\xf3rico (' + agPassados.length + ')';
            grpHist.appendChild(lblHist);
            agPassados.forEach(function (ag) { grpHist.appendChild(renderCard(ag)); });
            conteudo.appendChild(grpHist);
          }
        });
      }

    })();
  </script>
</body>

</html>

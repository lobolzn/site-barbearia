name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar firebase-config.js a partir do Secret
        run: |
          python3 - << 'PYEOF'
          import os
          key = os.environ["FIREBASE_API_KEY"]
          content = (
            "var firebaseConfig = {\n"
            "  apiKey: \"" + key + "\",\n"
            "  authDomain: \"site-barbearia-9add5.firebaseapp.com\",\n"
            "  databaseURL: \"https://site-barbearia-9add5-default-rtdb.firebaseio.com\",\n"
            "  projectId: \"site-barbearia-9add5\",\n"
            "  storageBucket: \"site-barbearia-9add5.firebasestorage.app\",\n"
            "  messagingSenderId: \"677128081916\",\n"
            "  appId: \"1:677128081916:web:4ca7538328bb20885c2279\"\n"
            "};\n"
          )
          with open("firebase-config.js", "w") as f:
              f.write(content)
          print("firebase-config.js criado com sucesso.")
          PYEOF
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
